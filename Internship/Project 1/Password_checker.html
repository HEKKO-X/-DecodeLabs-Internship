<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bfdbfe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      padding: 1rem;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 1.2rem;
      padding: 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header-icon {
      font-size: 2.5rem;
    }
    .header h1 {
      margin: 0.3rem 0 0;
      font-size: 1.2rem;
      color: #1e3a5f;
      font-weight: 700;
    }
    .header p {
      margin: 0.2rem 0 0;
      font-size: 0.75rem;
      color: #6b7280;
    }
    .input-wrapper {
      position: relative;
      margin-bottom: 1rem;
    }
    .input-wrapper input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.75rem 2.8rem 0.75rem 1rem;
      border-radius: 0.6rem;
      border: 2px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      font-family: monospace;
    }
    .input-wrapper button {
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .bar-container {
      background: #f3f4f6;
      border-radius: 999px;
      height: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #e5e7eb;
      border-radius: 999px;
      transition: width 0.4s, background 0.4s;
    }
    .result-container {
      display: none;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .status-text {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .score-text {
      font-size: 0.8rem;
      color: #6b7280;
    }
    .criteria-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .criteria-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
    }
    .feedback-box {
      background: #f9fafb;
      border-radius: 0.6rem;
      padding: 0.8rem;
      font-size: 0.8rem;
      color: #374151;
    }
    .feedback-item {
      margin-bottom: 0.3rem;
    }
    .feedback-item:last-child {
      margin-bottom: 0;
    }
    .empty-state {
      text-align: center;
      color: #9ca3af;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="header-icon">🔐</div>
      <h1>Password Strength Checker</h1>
      <p>DecodeLabs · Cyber Security · Project 1</p>
    </div>

    <div class="input-wrapper">
      <input type="password" id="pw-input" placeholder="Enter a password…">
      <button id="toggle-btn">👁️</button>
    </div>

    <div class="bar-container">
      <div class="bar-fill" id="strength-bar"></div>
    </div>

    <div id="result-container" class="result-container">
      <div class="status-row">
        <span id="strength-status" class="status-text"></span>
        <span id="score-display" class="score-text"></span>
      </div>

      <div class="criteria-grid" id="criteria-grid">
        </div>

      <div class="feedback-box" id="feedback-box">
        </div>
    </div>

    <p id="empty-state" class="empty-state">Type a password above to analyse it.</p>
  </div>

  <script>
    const COMMON = new Set([
      "password","123456","password123","qwerty","abc123",
      "letmein","welcome","admin","iloveyou","monkey",
      "1234567890","dragon","master","sunshine","princess"
    ]);

    const BAR_COLOR = { WEAK: "#ef4444", MEDIUM: "#f59e0b", STRONG: "#22c55e" };
    const ICON      = { WEAK: "🔴", MEDIUM: "🟡", STRONG: "🟢" };

    function checkStrength(pw) {
      if (!pw) return null;
      const result = {
        length: pw.length, hasUpper: false, hasDigit: false,
        hasSymbol: false, isCommon: false, score: 0, strength: "", feedback: []
      };
      
      if (pw.length < 8) {
        result.strength = "WEAK";
        result.feedback.push("Too short — minimum 8 characters required.");
        return result;
      }
      if (COMMON.has(pw.toLowerCase())) {
        result.isCommon = true; result.strength = "WEAK";
        result.feedback.push("Commonly leaked password — choose something unique.");
        return result;
      }
      
      result.hasUpper  = /[A-Z]/.test(pw);
      result.hasDigit  = /[0-9]/.test(pw);
      result.hasSymbol = /[^a-zA-Z0-9]/.test(pw);
      
      let score = 1;
      if (result.hasUpper)  score++; else result.feedback.push("Add at least one uppercase letter [A-Z].");
      if (result.hasDigit)  score++; else result.feedback.push("Add at least one digit [0-9].");
      if (result.hasSymbol) score++; else result.feedback.push("Add a special character [!@#$%^&*].");
      if (pw.length >= 12)  score++;
      
      result.score = score;
      result.strength = score <= 2 ? "WEAK" : score <= 3 ? "MEDIUM" : "STRONG";
      
      if (!result.feedback.length) result.feedback.push("Excellent password! All criteria met ✅");
      
      return result;
    }

    // DOM Elements
    const pwInput = document.getElementById('pw-input');
    const toggleBtn = document.getElementById('toggle-btn');
    const strengthBar = document.getElementById('strength-bar');
    const resultContainer = document.getElementById('result-container');
    const strengthStatus = document.getElementById('strength-status');
    const scoreDisplay = document.getElementById('score-display');
    const criteriaGrid = document.getElementById('criteria-grid');
    const feedbackBox = document.getElementById('feedback-box');
    const emptyState = document.getElementById('empty-state');

    // Toggle Password Visibility
    let showPassword = false;
    toggleBtn.addEventListener('click', () => {
      showPassword = !showPassword;
      pwInput.type = showPassword ? "text" : "password";
      toggleBtn.textContent = showPassword ? "🙈" : "👁️";
    });

    // Handle Input Changes
    pwInput.addEventListener('input', (e) => {
      const pw = e.target.value;
      const report = checkStrength(pw);

      if (!report) {
        // Empty state
        strengthBar.style.width = "0%";
        strengthBar.style.background = "#e5e7eb";
        resultContainer.style.display = "none";
        emptyState.style.display = "block";
        return;
      }

      // Update State
      emptyState.style.display = "none";
      resultContainer.style.display = "block";

      // Update Bar
      strengthBar.style.width = `${(report.score / 5) * 100}%`;
      strengthBar.style.background = BAR_COLOR[report.strength];

      // Update Status
      strengthStatus.style.color = BAR_COLOR[report.strength];
      strengthStatus.textContent = `${ICON[report.strength]} ${report.strength}`;
      scoreDisplay.textContent = `Score: ${report.score}/5`;

      // Update Criteria Grid
      const criteriaData = [
        ["Length ≥ 8",  report.length >= 8],
        ["Uppercase",   report.hasUpper],
        ["Digit",       report.hasDigit],
        ["Symbol",      report.hasSymbol],
        ["Length ≥ 12", report.length >= 12]
      ];
      
      criteriaGrid.innerHTML = criteriaData.map(([label, met]) => `
        <div class="criteria-item" style="color: ${met ? '#16a34a' : '#9ca3af'}">
          <span>${met ? '✔' : '✘'}</span><span>${label}</span>
        </div>
      `).join('');

      // Update Feedback
      feedbackBox.innerHTML = report.feedback.map(tip => `
        <div class="feedback-item">• ${tip}</div>
      `).join('');
    });
  </script>
</body>
</html>
